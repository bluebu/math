<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#ffb0d6"/>
      <stop offset="1" stop-color="#f7689f"/>
    </linearGradient>
  </defs>

  <!-- 背景：铺满整方块（iOS 主屏幕会自动圆角） -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 脸：圆角方形（几何、干净） -->
  <rect x="134" y="170" width="244" height="250" rx="92" ry="92" fill="#ffffff"/>

  <!-- 顶部蝴蝶结 -->
  <g transform="translate(256,166)">
    <path d="M0,3 C-18,-24 -48,-18 -48,0 C-48,18 -18,22 0,-3 Z" fill="#ff4f8f"/>
    <path d="M0,3 C18,-24 48,-18 48,0 C48,18 18,22 0,-3 Z" fill="#ff4f8f"/>
    <circle r="12" fill="#ec3f80"/>
  </g>

  <!-- 腮红 -->
  <g fill="#ffaccd">
    <ellipse cx="190" cy="332" rx="18" ry="11"/>
    <ellipse cx="322" cy="332" rx="18" ry="11"/>
  </g>

  <!-- 睫毛 -->
  <g stroke="#5a3147" stroke-width="6" stroke-linecap="round">
    <path d="M196,272 L183,266"/>
    <path d="M201,264 L191,255"/>
    <path d="M316,272 L329,266"/>
    <path d="M311,264 L321,255"/>
  </g>

  <!-- 眼睛 -->
  <g fill="#5a3147">
    <ellipse cx="214" cy="294" rx="16" ry="21"/>
    <ellipse cx="298" cy="294" rx="16" ry="21"/>
  </g>
  <g fill="#ffffff">
    <circle cx="220" cy="286" r="5.5"/>
    <circle cx="304" cy="286" r="5.5"/>
  </g>

  <!-- 微笑 -->
  <path d="M234,344 Q256,362 278,344" stroke="#c9527f" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
