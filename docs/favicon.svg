<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc6df"/>
      <stop offset="1" stop-color="#ff8ec1"/>
    </linearGradient>
  </defs>

  <!-- 背景：铺满整方块（iOS 主屏幕会自动圆角） -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 双马尾 -->
  <circle cx="136" cy="262" r="58" fill="#7a5240"/>
  <circle cx="376" cy="262" r="58" fill="#7a5240"/>

  <!-- 马尾蝴蝶结 -->
  <g>
    <g transform="translate(136,206)">
      <path d="M0,0 -34,-19 -34,19Z" fill="#ff5fa2"/>
      <path d="M0,0 34,-19 34,19Z" fill="#ff5fa2"/>
      <circle r="11" fill="#e8478c"/>
    </g>
    <g transform="translate(376,206)">
      <path d="M0,0 -34,-19 -34,19Z" fill="#ff5fa2"/>
      <path d="M0,0 34,-19 34,19Z" fill="#ff5fa2"/>
      <circle r="11" fill="#e8478c"/>
    </g>
  </g>

  <!-- 头发后层 -->
  <ellipse cx="256" cy="244" rx="132" ry="140" fill="#7a5240"/>

  <!-- 脸 -->
  <ellipse cx="256" cy="266" rx="102" ry="108" fill="#ffe1c2"/>

  <!-- 刘海 -->
  <path d="M154,252 Q150,150 256,150 Q362,150 358,252 Q330,214 300,226 Q286,178 256,212 Q226,178 212,226 Q182,214 154,252 Z" fill="#7a5240"/>

  <!-- 腮红 -->
  <g fill="#ff8db8" opacity="0.7">
    <ellipse cx="198" cy="314" rx="20" ry="13"/>
    <ellipse cx="314" cy="314" rx="20" ry="13"/>
  </g>

  <!-- 眼睛 -->
  <g fill="#3d2b22">
    <ellipse cx="219" cy="280" rx="13" ry="17"/>
    <ellipse cx="293" cy="280" rx="13" ry="17"/>
  </g>
  <g fill="#fff">
    <circle cx="223" cy="274" r="4.5"/>
    <circle cx="297" cy="274" r="4.5"/>
  </g>

  <!-- 微笑 -->
  <path d="M236,324 Q256,344 276,324" stroke="#d65b86" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
