<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>计算秘籍本 · 三年级下册</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="计算秘籍">
<meta name="theme-color" content="#ff9ec4">
<link rel="manifest" href="site.webmanifest">
<style>
  :root{
    --bg:#fcfbfa;
    --ink:#3a3744; --muted:#9b97a6; --line:#efedf3; --card:#ffffff;

    /* 品牌玫红 + 分类马卡龙色（柔和、轻盈） */
    --rose:#ff6f9c; --rose-tint:#fff0f5; --rose-ink:#c8467a;
    --sky:#5aa6f0;  --sky-tint:#ecf4fe;  --sky-ink:#2f6fc0;
    --peach:#ff9f5c;--peach-tint:#fff3e8;--peach-ink:#c96f2c;
    --mint:#43c8a0; --mint-tint:#e8f8f1; --mint-ink:#1f8f6e;
  }
  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; color:var(--ink);
    font-family:ui-rounded,"SF Pro Rounded","PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
    background:
      radial-gradient(130% 55% at 100% -10%, #fff0f6 0%, transparent 58%),
      radial-gradient(115% 50% at -10% -5%, #eef4ff 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed;
    min-height:100vh;
  }
  .wrap{ max-width:580px; margin:0 auto; padding:clamp(26px,6vw,44px) clamp(16px,5vw,22px) 64px; }

  /* ── 页眉 ── */
  header{ display:flex; align-items:center; gap:13px; }
  .logo{
    flex:0 0 auto; width:50px; height:50px; border-radius:16px; display:grid; place-items:center;
    font-size:27px; background:linear-gradient(155deg,#fff2f7,#ffe3ee);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 6px 14px -8px rgba(255,111,156,.55);
  }
  header h1{ font-size:clamp(22px,5.5vw,28px); margin:0; font-weight:800; letter-spacing:.5px; }
  header .sub{ margin:2px 0 0; color:var(--muted); font-size:13px; font-weight:600; }
  .count{ color:var(--muted); font-size:13.5px; font-weight:600; margin:18px 2px 16px; }
  .count b{ color:var(--rose-ink); font-weight:800; }

  /* ── 卡片（每张卡片靠 --c 系列变量上色） ── */
  .list{ display:flex; flex-direction:column; gap:12px; }
  .card{
    --c:var(--rose); --c-tint:var(--rose-tint); --c-ink:var(--rose-ink);
    display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;
    background:var(--card); border:1px solid var(--line); border-radius:22px;
    padding:14px 15px; position:relative;
    box-shadow:0 5px 18px -10px rgba(58,55,68,.16);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .card.sky{ --c:var(--sky); --c-tint:var(--sky-tint); --c-ink:var(--sky-ink); }
  .card.peach{ --c:var(--peach); --c-tint:var(--peach-tint); --c-ink:var(--peach-ink); }
  .card.mint{ --c:var(--mint); --c-tint:var(--mint-tint); --c-ink:var(--mint-ink); }
  .card:hover{ transform:translateY(-2px); border-color:var(--c);
    box-shadow:0 14px 30px -14px color-mix(in srgb,var(--c) 55%,transparent); }
  .card:active{ transform:translateY(0); }
  .card:focus-visible{ outline:3px solid var(--c); outline-offset:3px; }

  .icon{
    flex:0 0 50px; width:50px; height:50px; border-radius:15px; display:grid; place-items:center;
    font-size:25px; background:var(--c-tint);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
  }
  .body{ flex:1 1 auto; min-width:0; }
  .body .name{ font-size:17.5px; font-weight:800; letter-spacing:.2px; }
  .body .formula{ color:var(--c-ink); font-weight:600; font-size:13.5px; margin-top:3px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .meta{ flex:0 0 auto; text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .tag{ display:inline-block; font-size:11.5px; font-weight:700; color:var(--c-ink);
    background:var(--c-tint); border-radius:999px; padding:3px 11px; white-space:nowrap; }
  .date{ color:var(--muted); font-size:11.5px; font-variant-numeric:tabular-nums; }
  .arrow{ flex:0 0 auto; color:#d7d4de; font-size:21px; margin-left:1px; transition:color .18s ease,transform .18s ease; }
  .card:hover .arrow{ color:var(--c); transform:translateX(2px); }

  /* ── 固定入口：易错字本（淡玫红卡 + ⭐ 常翻） ── */
  .pinned{ background:linear-gradient(180deg,#fff6fa,#fff0f5); border-color:#fbdbe8; margin-bottom:18px; }
  .pin-mark{ position:absolute; top:12px; right:14px; display:inline-flex; align-items:center; gap:3px;
    font-size:11px; font-weight:800; color:#fff; background:var(--rose);
    border-radius:999px; padding:3px 9px; box-shadow:0 4px 10px -4px rgba(255,111,156,.7); }
  .pinned .meta{ display:none; }

  footer{ color:#bdb9c6; font-size:12px; text-align:center; margin-top:36px; }

  @media (max-width:430px){
    .card{ border-radius:18px; padding:12px 13px; gap:12px; }
    .icon{ flex-basis:44px; width:44px; height:44px; font-size:22px; }
    .body .name{ font-size:16px; }
    .body .formula{ font-size:12.5px; }
    .arrow{ display:none; }
  }
  @media (prefers-reduced-motion:reduce){
    .card,.arrow{ transition:none; }
    .card:hover{ transform:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">📒</div>
    <div>
      <h1>计算秘籍本</h1>
      <p class="sub">三年级下册 · 人教版</p>
    </div>
  </header>
  <p class="count">已收录 <b id="n">0</b> 个秘籍 · 点一张就翻开</p>

  <!-- 固定入口：易错字本（独立于下面的秘籍列表，永远置顶、不计数） -->
  <a class="card pinned" href="易错字本.html">
    <span class="pin-mark">⭐ 常翻</span>
    <div class="icon">📝</div>
    <div class="body">
      <div class="name">易错字本</div>
      <div class="formula">不会写、爱写错的字，都收在这儿</div>
    </div>
  </a>

  <div class="list" id="list">

    <!-- ===== 一条秘籍 = 一个 <a class="card 颜色"> ===== -->
    <a class="card sky" href="商中间末尾有0-计算秘籍.html" data-date="2026-06-21">
      <div class="icon">0️⃣</div>
      <div class="body">
        <div class="name">商中间、末尾有 0</div>
        <div class="formula">哪一位不够除，商就在那位写 0</div>
      </div>
      <div class="meta">
        <span class="tag">除法竖式</span>
        <span class="date">2026-06-21</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card peach" href="求经过天数-计算秘籍.html" data-date="2026-06-21">
      <div class="icon">📅</div>
      <div class="body">
        <div class="name">求经过天数</div>
        <div class="formula">总天数 ＝ 最后一天 － 第一天 ＋ 1</div>
      </div>
      <div class="meta">
        <span class="tag">年月日</span>
        <span class="date">2026-06-21</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- 复制上面整段 <a>…</a> 即可新增一个秘籍：
         · class    在 card 后加颜色：sky / peach / mint（留空＝玫红）
         · href     新讲义文件名
         · icon     合适的 emoji
         · name     秘籍名称
         · formula  一句话核心公式（可留空）
         · tag      所属单元/主题
         · date / data-date  记录日期，写成 2026-06-21 这种格式 -->

  </div>

  <footer>每学会一个，就在这本里多一页 ✦</footer>
</div>

<script>
  // 自动统计数量，并按「记录日期」从新到旧排序，新增卡片不用手动维护
  (function(){
    var list = document.getElementById('list');
    var cards = Array.prototype.slice.call(list.querySelectorAll('.card'));
    cards.sort(function(a,b){
      return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    });
    cards.forEach(function(c){ list.appendChild(c); });
    document.getElementById('n').textContent = cards.length;
  })();
</script>
</body>
</html>
