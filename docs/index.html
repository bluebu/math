<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>计算秘籍本 · 三年级下册</title>
<style>
  :root{
    --ink:#1f2937; --soft:#64748b; --line:#e5e9f0; --bg:#f6f8fc;
    --amber:#f59e0b; --blue:#3b82f6; --green:#22c55e;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
    line-height:1.5;
  }
  .wrap{ max-width:720px; margin:0 auto; padding:32px 18px 60px; }

  header{ border-bottom:3px solid var(--ink); padding-bottom:14px; margin-bottom:8px; }
  header .row{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  header h1{ font-size:27px; margin:0; letter-spacing:1px; }
  header .sub{ color:var(--soft); font-size:14px; }
  .count{ color:var(--soft); font-size:13px; margin:10px 0 18px; }
  .count b{ color:var(--amber); font-size:15px; }

  .list{ display:flex; flex-direction:column; gap:12px; }

  .card{
    display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;
    background:#fff; border:1.5px solid var(--line); border-radius:14px;
    padding:14px 16px; transition:.15s; position:relative;
  }
  .card:hover{ border-color:var(--blue); box-shadow:0 4px 16px rgba(59,130,246,.12); transform:translateY(-1px); }
  .icon{
    flex:0 0 46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-size:24px; background:#fff7e6; border:1.5px solid #ffe1a8;
  }
  .body{ flex:1 1 auto; min-width:0; }
  .body .name{ font-size:18px; font-weight:700; }
  .body .formula{ color:#b45309; font-weight:600; font-size:14px; margin-top:2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .meta{ flex:0 0 auto; text-align:right; }
  .tag{ display:inline-block; font-size:12px; color:#1e40af; background:#eef5ff;
    border:1px solid #d6e4ff; border-radius:999px; padding:2px 10px; }
  .date{ display:block; color:var(--soft); font-size:12px; margin-top:6px; font-variant-numeric:tabular-nums; }
  .arrow{ color:#cbd5e1; font-size:22px; flex:0 0 auto; margin-left:2px; }
  .card:hover .arrow{ color:var(--blue); }

  footer{ color:#94a3b8; font-size:12px; text-align:center; margin-top:34px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="row">
      <h1>📒 计算秘籍本</h1>
      <span class="sub">三年级下册 · 人教版</span>
    </div>
  </header>
  <div class="count">已收录 <b id="n">0</b> 个秘籍 · 点击卡片打开讲义</div>

  <div class="list" id="list">

    <!-- ===== 一条秘籍 = 一个 <a class="card"> ===== -->
    <a class="card" href="求经过天数-计算秘籍.html" data-date="2026-06-21">
      <div class="icon">📅</div>
      <div class="body">
        <div class="name">求经过天数</div>
        <div class="formula">总天数 ＝ 最后一天 － 第一天 ＋ 1</div>
      </div>
      <div class="meta">
        <span class="tag">年月日</span>
        <span class="date">2026-06-21</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- 复制上面整段 <a>…</a> 即可新增一个秘籍：
         · href     改成新讲义的文件名
         · icon     换个合适的 emoji
         · name     秘籍名称
         · formula  一句话的核心公式（可留空）
         · tag      所属单元/主题
         · date / data-date  记录日期，写成 2026-06-21 这种格式 -->

  </div>

  <footer>每学会一个，就在这本里多一页 ✦</footer>
</div>

<script>
  // 自动统计数量，并按「记录日期」从新到旧排序，新增卡片不用手动维护
  (function(){
    var list = document.getElementById('list');
    var cards = Array.prototype.slice.call(list.querySelectorAll('.card'));
    cards.sort(function(a,b){
      return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    });
    cards.forEach(function(c){ list.appendChild(c); });
    document.getElementById('n').textContent = cards.length;
  })();
</script>
</body>
</html>
